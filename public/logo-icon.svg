<svg viewBox="0 0 100 112" xmlns="http://www.w3.org/2000/svg" width="100" height="112">
  <defs>
    <linearGradient id="shieldFill" x1="0" y1="0" x2="0.15" y2="1">
      <stop offset="0%" stop-color="#F5F0E6"/>
      <stop offset="100%" stop-color="#E8E0CC"/>
    </linearGradient>
    <linearGradient id="gg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8CE74"/>
      <stop offset="30%" stop-color="#CFA843"/>
      <stop offset="70%" stop-color="#B88E28"/>
      <stop offset="100%" stop-color="#9A7418"/>
    </linearGradient>
    <linearGradient id="swg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9A7418" stop-opacity="0"/>
      <stop offset="30%" stop-color="#CFA843"/>
      <stop offset="70%" stop-color="#CFA843"/>
      <stop offset="100%" stop-color="#9A7418" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Shield body: cream/white so it pops on dark navy background -->
  <path d="M50 3
    C 62 3 74 5.5 83 10 L90 14 L90 45
    C 90 67 81 82 70 91 L50 99
    L 30 91 C 19 82 10 67 10 45
    L 10 14 L 17 10
    C 26 5.5 38 3 50 3 Z"
    fill="url(#shieldFill)"/>

  <!-- Inner border — navy stroke creates double-border effect on cream shield -->
  <path d="M50 8
    C 61 8 72 10 80 14 L86 17 L86 45
    C 86 65 78 79 68 87 L50 94
    L 32 87 C 22 79 14 65 14 45
    L 14 17 L 20 14
    C 28 10 39 8 50 8 Z"
    fill="none" stroke="#1B3272" stroke-width="1.5"/>

  <!-- N left bar — navy on cream, clearly visible -->
  <rect x="17" y="20" width="13" height="58" rx="0.5" fill="#1B3272"/>

  <!-- N right bar -->
  <rect x="70" y="20" width="13" height="58" rx="0.5" fill="#1B3272"/>

  <!-- N diagonal -->
  <polygon points="17,20 30,20 83,78 70,78" fill="#1B3272"/>

  <!-- Gold vertical pillar -->
  <rect x="43" y="16" width="14" height="66" rx="0.5" fill="url(#gg)"/>

  <!-- Gold swoosh -->
  <path d="M12 89 Q50 97 88 89"
    fill="none"
    stroke="url(#swg)"
    stroke-width="2.8"
    stroke-linecap="round"/>
</svg>
